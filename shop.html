<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | LuxLap</title>

<style>
body { font-family: Poppins, sans-serif; margin:0; }
.container { width:90%; margin:auto; }

.navbar {
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  background:#fff;
  border-bottom:1px solid #eee;
}

.logo { color:#c9a45c; font-weight:600; }

.nav-links a {
  margin-left:20px;
  text-decoration:none;
  color:#333;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover { transform:translateY(-5px); }

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#c9a45c;
  font-weight:600;
}

button {
  padding:8px 15px;
  border:none;
  background:gold;
  cursor:pointer;
  border-radius:20px;
}
</style>
</head>

<body>

<header class="navbar">
  <div class="logo">LuxLap</div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<section style="text-align:center; padding:60px 20px;">
  <h1>Premium Laptop Collection</h1>
</section>

<section class="container">
  <div id="products">Loading products...</div>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

// LOAD PRODUCTS
async function loadProducts() {
  const { data, error } = await supabase
    .from("products")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    document.getElementById("products").innerHTML = "Error loading products";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("products").innerHTML = "No products found";
    return;
  }

  renderProducts(data);
}

// RENDER
function renderProducts(products){
  const container = document.getElementById("products");

  container.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;">
      ${products.map(p => {
        const id = p.id;            // ✅ FIXED
        const image = p.image;

        return `
          <div class="card" onclick="openProduct(${id})">
            <img src="${image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>

            <button onclick="event.stopPropagation(); addToCart(${id})">
              Add to Cart
            </button>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

// OPEN PRODUCT
function openProduct(id){
  localStorage.setItem("selectedProduct", id);
  window.location.href = "product.html";
}

// CART (FIXED)
function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id === id);   // ✅ FIXED

  if(item) item.qty++;
  else cart.push({ id, qty:1 });           // ✅ FIXED

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to Cart");
}

// INIT
loadProducts();
</script>

</body>
</html>
