<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | LuxLap</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">LuxLap</div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
    </nav>
  </div>
</header>

<!-- HEADER -->
<section style="text-align:center; padding:60px 20px; background:linear-gradient(to right,#fff,#f5f5f5)">
  <h1 style="font-size:42px; margin-bottom:10px;">Premium Laptop Collection</h1>
  <p style="color:#777;">Discover high-performance machines crafted for excellence</p>
</section>

<!-- PRODUCTS -->
<section class="products container" id="products"></section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 LuxLap. Premium Experience.</p>
</footer>

<script>



function renderProducts(){
let container=document.getElementById("products");

container.innerHTML = `
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;">
${products.map(p=>`
<div class="card" onclick="openProduct(${p.id})" style="cursor:pointer;">
  <img src="${p.img}">
  <div class="card-content">
    <h3>${p.name}</h3>
    <p class="price">$${p.price}</p>
    <button onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
  </div>
</div>
`).join("")}
</div>
`;
}

// ✅ OPEN PRODUCT PAGE
function openProduct(id){
  console.log("Clicked:", id); // DEBUG
  localStorage.setItem("selectedProduct", id);
  window.location.href = "product.html";
}

// CART
function addToCart(id){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let item=cart.find(i=>i.id===id);

if(item){
  item.qty++;
} else {
  cart.push({id,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to Cart");
}

renderProducts();

</script>

</body>
</html>
