<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LuxLap</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      height: 100vh;
      display: flex;
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: #fff;
    }

    .login-container {
      display: flex;
      width: 100%;
    }

    .login-left {
      flex: 1;
      background: url('https://source.unsplash.com/1000x1000/?luxury,laptop') no-repeat center/cover;
      position: relative;
    }

    .login-left::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }

    .login-left-content {
      position: absolute;
      bottom: 60px;
      left: 40px;
      z-index: 2;
    }

    .login-left h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .login-left p {
      color: #ccc;
      max-width: 400px;
    }

    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .login-box {
      width: 350px;
      padding: 40px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .login-box h2 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .login-box input::placeholder {
      color: #aaa;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, gold, #c9a45c);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-box button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .extra-links {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    .extra-links a {
      color: gold;
      text-decoration: none;
    }

    @media(max-width:900px){
      .login-left {
        display: none;
      }
      .login-right {
        flex: 1;
      }
    }
  </style>
</head>

<body>

<div class="login-container">

  <!-- LEFT SIDE -->
  <div class="login-left">
    <div class="login-left-content">
      <h1>LuxLap</h1>
      <p>Step into the world of premium laptops. Experience performance, design, and luxury like never before.</p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="login-right">
    <form class="login-box" onsubmit="login(event)">
      <h2>Welcome Back</h2>

      <!-- ✅ IDs ADDED -->
      <input id="email" type="email" placeholder="Enter Email" required>
      <input id="password" type="password" placeholder="Enter Password" required>

      <button type="submit">Login</button>

      <div class="extra-links">
        <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </form>
  </div>

</div>

<!-- ✅ SUPABASE FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
