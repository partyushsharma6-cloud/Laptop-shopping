<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxLap | Premium Laptops</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .navbar {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .nav-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #c9a45c;
    }

    .nav-links a {
      margin: 0 15px;
      text-decoration: none;
      color: #eee;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1773332598451-8a0a59941912?q=80&w=687&auto=format&fit=crop') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content { color: white; text-align: center; }

    .section-title {
      text-align: center;
      margin: 40px 0;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="nav-wrapper">
    <div class="logo">LuxLap</div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Redefining Luxury Computing</h1>
    <a href="shop.html">Explore</a>
  </div>
</section>

<section>
  <h2 class="section-title">Featured Laptops</h2>
  <div id="products"></div>
</section>

<footer style="text-align:center;padding:20px;">
  © 2026 LuxLap
</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

// LOAD PRODUCTS
async function loadProducts() {
  const { data, error } = await supabase
    .from("products")
    .select("*");

  if (error) {
    console.error(error);
    document.getElementById("products").innerHTML = "Error loading products";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("products").innerHTML = "No products found";
    return;
  }

  renderProducts(data);
}

// RENDER
function renderProducts(products) {
  const container = document.getElementById("products");

  container.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;">
      ${products.map(p => `
        <div class="card" onclick="openProduct(${p.product_id})">
          <img src="${p.image}">
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <button onclick="event.stopPropagation(); addToCart(${p.product_id})">
            Add
          </button>
        </div>
      `).join("")}
    </div>
  `;
}

// OPEN PRODUCT
function openProduct(id){
  localStorage.setItem("selectedProduct", id);
  window.location.href = "product.html";
}

// CART
function addToCart(product_id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.product_id === product_id);

  if(item) item.qty++;
  else cart.push({ product_id, qty:1 });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// INIT
loadProducts();
</script>

</body>
</html>
