<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxLap | Premium Laptops</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }

    .navbar {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    .logo { color: #c9a45c; font-weight: 600; }

    .nav-links a { color: #eee; margin: 0 15px; text-decoration: none; }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black;
      color: white;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 32px;
    }

    .product-card {
      background: #111;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      color: white;
      transition: 0.3s;
    }

    .product-card:hover { transform: scale(1.05); }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card button {
      margin-top: 10px;
      padding: 10px;
      background: gold;
      border: none;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #aaa;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-wrapper">
    <div class="logo">LuxLap</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Luxury Laptops</h1>
    <p>Powered by performance & elegance</p>
  </div>
</section>

<!-- PRODUCTS -->
<section style="padding:80px 20px;">
  <h2 class="section-title">Featured Laptops</h2>

  <!-- IMPORTANT: THIS MUST BE EMPTY -->
  <div id="products"></div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 LuxLap</p>
</footer>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
