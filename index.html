<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxLap | Premium Laptops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: #fff;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.6);
}

.nav-wrapper {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
}

.logo {
  font-size: 22px;
  color: gold;
}

.nav-links a {
  margin: 0 15px;
  color: #ddd;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1773332598451-8a0a59941912?q=80&w=687&auto=format&fit=crop') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-content {
  text-align: center;
}

.hero-content h1 {
  font-size: 40px;
}

.hero-content a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: gold;
  color: black;
  border-radius: 20px;
  text-decoration: none;
}

/* SECTION */
.section {
  padding: 60px 40px;
}

.section-title {
  text-align: center;
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: gold;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: gold;
  cursor: pointer;
  border-radius: 20px;
}
</style>
</head>

<body>

<header class="navbar">
  <div class="nav-wrapper">
    <div class="logo">LuxLap</div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profile</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Redefining Luxury Computing</h1>
    <a href="shop.html">Explore</a>
  </div>
</section>

<section class="section">
  <h2 class="section-title">Featured Laptops</h2>
  <div id="products">Loading...</div>
</section>

<!-- ✅ SUPABASE LOAD ONLY -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

// LOAD PRODUCTS
async function loadProducts() {
  const container = document.getElementById("products");

  const { data, error } = await supabase
    .from("products")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    container.innerHTML = "Error loading products";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "No products";
    return;
  }

  renderProducts(data);
}

// RENDER
function renderProducts(products) {
  const container = document.getElementById("products");

  container.innerHTML = `
    <div class="grid">
      ${products.map(p => `
        <div class="card" onclick="openProduct(${p.id})">
          <img src="${p.image}">
          <h3>${p.name}</h3>
          <p class="price">$${p.price}</p>
          <button onclick="event.stopPropagation(); addToCart(${p.id})">
            Add
          </button>
        </div>
      `).join("")}
    </div>
  `;
}

// GLOBAL FUNCTIONS
function openProduct(id){
  localStorage.setItem("selectedProduct", id);
  window.location.href = "product.html";
}

function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id === id);

  if(item) item.qty++;
  else cart.push({ id, qty:1 });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// INIT
loadProducts();
</script>

</body>
</html>
