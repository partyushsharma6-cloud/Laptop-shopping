<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxLap | Premium Laptops</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .navbar {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0);
      backdrop-filter: blur(5px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-links a { color: #eee; }
    .nav-links a:hover { color: #c9a45c; }

    .nav-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #c9a45c;
      letter-spacing: 2px;
    }

    .nav-links a {
      margin: 0 15px;
      text-decoration: none;
      font-weight: 500;
    }

    .btn-nav {
      padding: 8px 18px;
      border-radius: 20px;
      background: linear-gradient(45deg, gold, #c9a45c);
      color: #000 !important;
      font-weight: 600;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1773332598451-8a0a59941912?q=80&w=687&auto=format&fit=crop') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content { color: #fff; text-align: center; }
    .hero h1 { font-size: 60px; }

    .btn-primary {
      padding: 12px 30px;
      border-radius: 30px;
      background: linear-gradient(45deg, gold, #c9a45c);
      color: #000;
      text-decoration: none;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 32px;
    }

    .category-card {
      padding: 40px;
      text-align: center;
      border-radius: 15px;
      background: #fff;
      transition: 0.3s;
    }

    .category-card:hover {
      transform: translateY(-10px);
    }

    .banner {
      margin: 80px 0;
      padding: 100px 20px;
      text-align: center;
      background: linear-gradient(to right,#f8f5ef,#fff);
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #fff;
      color: #777;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: #c9a45c;
    }

    @media screen and (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        background: rgba(0,0,0,0.95);
        width: 200px;
        flex-direction: column;
        display: none;
        padding: 20px;
      }

      .nav-links.active { display: flex; }
      .menu-toggle { display: block; }
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="nav-wrapper">
    <div class="logo">LuxLap</div>

    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-nav">Register</a>
    </nav>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Redefining Luxury Computing</h1>
    <p>Experience power, elegance, and precision</p>
    <a href="shop.html" class="btn-primary">Explore Collection</a>
  </div>
</section>

<section style="padding:80px 20px;">
  <h2 class="section-title">Categories</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;">
    <div class="category-card">Gaming</div>
    <div class="category-card">Business</div>
    <div class="category-card">Student</div>
    <div class="category-card">Premium</div>
  </div>
</section>

<section class="products">
  <h2 class="section-title">Featured Laptops</h2>
  <div id="products"></div>
</section>

<section class="banner">
  <h2>Crafted for Professionals</h2>
  <p>Ultra performance. Ultra design. Ultra luxury.</p>
</section>

<footer>
  <p>© 2026 LuxLap</p>
</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://xopxvrmmzanowgpyvolv.supabase.co";
const SUPABASE_KEY = "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOAD PRODUCTS
async function loadProducts() {
  const { data, error } = await supabaseClient
    .from("products")
    .select("*");

  if (error) {
    console.error("Supabase error:", error);
    return;
  }

  renderProducts(data);
}

// RENDER PRODUCTS
function renderProducts(products) {
  const container = document.getElementById("products");

  container.innerHTML = `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;">
    ${products.map(p => `
      <div class="card" onclick="openProduct(${p.product_id})">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="event.stopPropagation(); addToCart(${p.product_id})">Add</button>
      </div>
    `).join("")}
  </div>
  `;
}

// OPEN PRODUCT
function openProduct(product_id){
  localStorage.setItem("selectedProduct", product_id);
  window.location.href = "product.html";
}

// ADD TO CART (FIXED STRUCTURE)
function addToCart(product_id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.product_id === product_id);

  if(item) item.qty++;
  else cart.push({ product_id, qty:1 });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// MOBILE MENU
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

// INIT
loadProducts();
</script>

</body>
</html>
