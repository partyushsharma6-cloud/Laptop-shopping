<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | LuxLap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Poppins, sans-serif; margin:0; }
    .container { width:90%; margin:auto; }
    .center { text-align:center; padding:80px; }

    .product {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      padding:60px 0;
    }

    img { width:100%; border-radius:10px; }

    button {
      padding:12px 20px;
      background:gold;
      border:none;
      cursor:pointer;
      border-radius:20px;
    }
  </style>
</head>

<body>

<div class="container">
  <div id="product" class="center">Loading product...</div>
</div>

<!-- ONLY ONE SUPABASE SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// 🔥 ONLY ONE CLIENT (IMPORTANT)
const supabase = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

// ✅ GET ID
const id = parseInt(localStorage.getItem("selectedProduct"));
console.log("ID:", id);

// ✅ LOAD
async function load(){
  const container = document.getElementById("product");

  if(!id){
    container.innerHTML = "No product selected";
    return;
  }

  const { data, error } = await supabase
    .from("products")
    .select("*")
    .eq("product_id", id)
    .single();

  console.log(data, error);

  if(error || !data){
    container.innerHTML = "Product not found";
    return;
  }

  container.classList.remove("center");

  container.innerHTML = `
    <div class="product">
      <img src="${data.image}">
      <div>
        <h1>${data.name}</h1>
        <h2>$${data.price}</h2>
        <button onclick="add(${data.product_id})">Add to Cart</button>
      </div>
    </div>
  `;
}

// CART
function add(product_id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i => i.product_id === product_id);

  if(item) item.qty++;
  else cart.push({ product_id, qty:1 });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added");
}

load();
</script>

</body>
</html>
