<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | LuxLap</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      padding: 60px 20px;
    }

    .product-container img {
      width: 100%;
      border-radius: 12px;
    }

    .product-info h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .product-info h2 {
      color: #c9a45c;
      margin-bottom: 20px;
    }

    .product-info p {
      color: #666;
      margin-bottom: 20px;
    }

    .product-info ul {
      margin-bottom: 20px;
      color: #444;
    }

    .product-info button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, gold, #c9a45c);
      font-weight: 600;
      cursor: pointer;
    }

    @media(max-width:768px){
      .product-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">LuxLap</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
    </nav>
  </div>
</header>

<!-- PRODUCT DETAIL -->
<section class="container">
  <div id="productDetail"></div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 LuxLap • Premium Laptop Store</p>
</footer>

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// ✅ Supabase Setup
const SUPABASE_URL = "https://xopxvrmmzanowgpyvolv.supabase.co";
const SUPABASE_KEY = "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔥 GET SELECTED PRODUCT ID
const id = Number(localStorage.getItem("selectedProduct"));

// 🚀 LOAD PRODUCT FROM DATABASE
async function loadProduct() {
  const { data, error } = await supabase
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  const container = document.getElementById("productDetail");

  if (error || !data) {
    container.innerHTML = "<h2 style='text-align:center;'>Product not found</h2>";
    console.error(error);
    return;
  }

  // ✅ RENDER PRODUCT
  container.innerHTML = `
    <div class="product-container">

      <img src="${data.image}">

      <div class="product-info">
        <h1>${data.name}</h1>
        <h2>₹${data.price}</h2>

        <p>
          Experience premium performance with cutting-edge technology,
          sleek design, and long-lasting durability.
        </p>

        <ul>
          <li>✔ High-speed processor</li>
          <li>✔ Premium metal build</li>
          <li>✔ Long battery backup</li>
          <li>✔ Ultra-slim & lightweight</li>
        </ul>

        <button onclick="addToCart(${data.id})">Add to Cart</button>
      </div>

    </div>
  `;
}

// 🛒 CART
function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i => i.id === id);

  if(item) item.qty++;
  else cart.push({id, qty:1});

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to Cart");
}

// 🚀 INIT
loadProduct();
</script>

</body>
</html>
