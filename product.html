<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | LuxLap</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      padding: 60px 20px;
    }

    .product-container img {
      width: 100%;
      border-radius: 12px;
    }

    .product-info h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .product-info h2 {
      color: #c9a45c;
      margin-bottom: 20px;
    }

    .product-info p {
      color: #666;
      margin-bottom: 20px;
    }

    .product-info ul {
      margin-bottom: 20px;
      color: #444;
    }

    .product-info button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, gold, #c9a45c);
      font-weight: 600;
      cursor: pointer;
    }

    /* MOBILE */
    @media(max-width:768px){
      .product-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">LuxLap</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
    </nav>
  </div>
</header>

<!-- PRODUCT DETAIL -->
<section class="container">
  <div id="productDetail"></div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 LuxLap • Premium Laptop Store</p>
</footer>

<!-- JS -->
<script>

// SAME PRODUCTS AS SHOP (IMPORTANT)
const products = [
{id:1,name:"MacBook Pro M3",price:3200,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=1026&auto=format&fit=crop"},
{id:2,name:"Dell XPS 15",price:2800,img:"https://images.unsplash.com/photo-1558864559-ed673ba3610b?q=80&w=1332&auto=format&fit=crop"},
{id:3,name:"HP Spectre x360",price:2500,img:"https://images.unsplash.com/photo-1554246247-6993b606e8b9?q=80&w=1170&auto=format&fit=crop"},
{id:4,name:"Asus ROG Zephyrus",price:3000,img:"https://images.unsplash.com/photo-1636211990414-8edec17ba047?q=80&w=687&auto=format&fit=crop"},
{id:5,name:"Lenovo ThinkPad X1",price:2700,img:"https://images.unsplash.com/photo-1636211990414-8edec17ba047?q=80&w=687&auto=format&fit=crop"},
{id:6,name:"Razer Blade 16",price:3500,img:"https://images.unsplash.com/photo-1694233292914-ce80c196ffcc?q=80&w=715&auto=format&fit=crop"},
{id:7,name:"Acer Predator Helios",price:2200,img:"https://images.unsplash.com/photo-1693596936248-8fab255a3de1?q=80&w=1074&auto=format&fit=crop"},
{id:8,name:"Microsoft Surface Laptop",price:2100,img:"https://images.unsplash.com/photo-1669698158680-522e6574c8ed?q=80&w=1332&auto=format&fit=crop"},
{id:9,name:"Samsung Galaxy Book",price:2000,img:"https://images.unsplash.com/photo-1636211992838-251a43d72ad2?q=80&w=687&auto=format&fit=crop"},
{id:10,name:"LG Gram Ultra",price:2300,img:"https://images.unsplash.com/photo-1572985919466-6d00864965c8?q=80&w=1170&auto=format&fit=crop"}
];

// GET SELECTED PRODUCT
const id = localStorage.getItem("selectedProduct");
const product = products.find(p => p.id == id);

const container = document.getElementById("productDetail");

// IF PRODUCT FOUND
if(product){
container.innerHTML = `
<div class="product-container">

  <img src="${product.img}">

  <div class="product-info">
    <h1>${product.name}</h1>
    <h2>₹${product.price}</h2>

    <p>
      Experience premium performance with cutting-edge technology,
      sleek design, and long-lasting durability.
    </p>

    <ul>
      <li>✔ High-speed processor</li>
      <li>✔ Premium metal build</li>
      <li>✔ Long battery backup</li>
      <li>✔ Ultra-slim & lightweight</li>
    </ul>

    <button onclick="addToCart(${product.id})">Add to Cart</button>
  </div>

</div>
`;
} else {
container.innerHTML = "<h2 style='text-align:center;'>Product not found</h2>";
}

// ADD TO CART
function addToCart(id){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let item=cart.find(i=>i.id===id);

if(item){
  item.qty++;
} else {
  cart.push({id,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to Cart");
}

</script>

</body>
</html>
