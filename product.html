<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | LuxLap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Poppins, sans-serif; margin:0; }

    .navbar {
      display:flex;
      justify-content:space-between;
      padding:15px 40px;
      background:#fff;
      border-bottom:1px solid #eee;
    }

    .logo {
      font-weight:600;
      color:#c9a45c;
    }

    .nav-links a {
      margin-left:20px;
      text-decoration:none;
      color:#333;
    }

    .container { width:90%; margin:auto; }
    .center { text-align:center; padding:80px; }

    .product {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      padding:60px 0;
      align-items:center;
    }

    img { width:100%; border-radius:10px; }

    button {
      padding:12px 20px;
      background:gold;
      border:none;
      cursor:pointer;
      border-radius:20px;
    }

    @media(max-width:768px){
      .product { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">LuxLap</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
</div>

<div class="container">
  <div id="product" class="center">Loading product...</div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const db = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

// GET ID
const id = parseInt(localStorage.getItem("selectedProduct"));
console.log("Selected ID:", id);

// LOAD PRODUCT
async function load(){
  const container = document.getElementById("product");

  if(!id || isNaN(id)){
    container.innerHTML = "No product selected";
    return;
  }

  const { data, error } = await db
    .from("products")
    .select("*")
    .eq("id", id)          // ✅ FIXED
    .single();

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error || !data){
    container.innerHTML = "Product not found";
    return;
  }

  container.classList.remove("center");

  container.innerHTML = `
    <div class="product">
      <img src="${data.image}" alt="${data.name}">
      <div>
        <h1>${data.name}</h1>
        <h2>$${data.price}</h2>
        <button onclick="addToCart(${data.id})">Add to Cart</button>
      </div>
    </div>
  `;
}

// CART (FIXED)
function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let item = cart.find(i => i.id === id);   // ✅ FIXED

  if(item) item.qty++;
  else cart.push({ id, qty:1 });           // ✅ FIXED

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// INIT
load();
</script>

</body>
</html>
