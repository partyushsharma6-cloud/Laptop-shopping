<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | LuxLap</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: #eee;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.6);
}
.logo { font-size: 20px; }

.nav-links a {
  color: #ccc;
  margin-left: 20px;
  text-decoration: none;
}

.cart-count {
  background: gold;
  color: black;
  padding: 2px 8px;
  border-radius: 10px;
}

.container { width: 90%; margin: auto; }
h1 { text-align: center; }

.cart-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 30px;
}

.cart-item {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.cart-item img { width: 90px; }

.item-info { flex: 1; margin-left: 15px; }

.item-controls {
  display: flex;
  gap: 10px;
}

.qty-btn {
  background: #222;
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}

.remove-btn {
  color: red;
  border: none;
  background: transparent;
  cursor: pointer;
}

.cart-summary {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
}

.summary-row, .summary-total {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.summary-total {
  border-top: 1px solid #444;
  padding-top: 10px;
}

.hidden { display: none; }
.empty { text-align: center; margin-top: 80px; }
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">LuxLap</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart <span id="cartCount" class="cart-count">0</span></a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">
<h1>Your Cart</h1>

<div id="empty" class="empty hidden">
  <h2>Your cart is empty</h2>
</div>

<div class="cart-layout">
  <div id="cartItems"></div>

  <div class="cart-summary">
    <h2>Summary</h2>
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotal">$0</span>
    </div>
    <div class="summary-total">
      <span>Total</span>
      <span id="total">$0</span>
    </div>
  </div>
</div>
</div>

<!-- ✅ ONLY LOAD SUPABASE (NO DUPLICATE INIT ISSUE HERE) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://xopxvrmmzanowgpyvolv.supabase.co",
  "sb_publishable_iODXIxkPjoMOMXel01oFDg_5Q7IvoQP"
);

let products = [];

// LOAD PRODUCTS
async function loadProducts(){
  const { data, error } = await supabase.from("products").select("*");

  if(error){
    console.error(error);
    return;
  }

  products = data || [];
  loadCart();
}

// LOAD CART
function loadCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart = cart.filter(item => item.id && item.qty > 0);
  localStorage.setItem("cart", JSON.stringify(cart));

  let container = document.getElementById("cartItems");
  let subtotal = 0;
  container.innerHTML = "";

  if(cart.length === 0){
    document.getElementById("empty").classList.remove("hidden");
    updateCartCount();
    return;
  }

  cart.forEach(item => {
    let product = products.find(p => p.id == item.id);
    if(!product) return;

    let qty = item.qty;
    let total = product.price * qty;
    subtotal += total;

    container.innerHTML += `
      <div class="cart-item">
        <img src="${product.image}">
        <div class="item-info">
          <h3>${product.name}</h3>
          <p>$${product.price}</p>
        </div>

        <div class="item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
          <span>${qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
        </div>

        <div style="margin-left:10px;">$${total}</div>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = "$" + subtotal;
  document.getElementById("total").innerText = "$" + subtotal;

  updateCartCount();
}

// UPDATE COUNT
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let count = cart.reduce((sum,i)=> sum + i.qty,0);
  document.getElementById("cartCount").innerText = count;
}

// CHANGE QTY
function changeQty(id, delta){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart = cart.map(item => {
    if(item.id == id){
      item.qty += delta;
      if(item.qty < 1) item.qty = 1;
    }
    return item;
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// REMOVE ITEM
function removeItem(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(item => item.id != id);

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// INIT
loadProducts();
</script>

</body>
</html>
